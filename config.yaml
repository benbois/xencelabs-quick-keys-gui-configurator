# Xencelabs Quick Keys - Configuration
# Copy to ~/.config/Xencelab/config.yaml for first-time setup

device:
  brightness: medium      # off, low, medium, full
  orientation: 180         # 0, 90, 180, 270
  wheel_speed: normal     # slowest, slower, normal, faster, fastest
  overlay_duration: 2     # seconds to display layer name
  keyboard_layout: azerty # qwerty or azerty (fr-FR)
  sleep_timeout: 30       # minutes before sleep (0 = disabled)
  initial_layer: 0        # index (0, 1, 2...) or layer name at startup
  double_click_ms: 500    # double-click window for button 8
  button_8_double: ["INTERNAL_BATTERY_OVERLAY"]  # button 8 double-click = show battery (global only)
  show_battery_in_layer_name: true  # show ▍▍▍ NN% after layer name on device OLED

# Buttons: keys = single click. Double-click only on button 8 (Set) = device.button_8_double
layers:
  - name: "General"
    color: { r: 0, g: 0, b: 255 }
    wheel_speed: faster
    buttons:
      6:
        label: "Vol -"
        keys: ["KEY_VOLUMEDOWN"]
      7:
        label: "Vol +"
        keys: ["KEY_VOLUMEUP"]
      8:
        label: "Layer"
        keys: ["INTERNAL_LAYER_CYCLE"]
      9:
        label: "Mute"
        keys: ["KEY_MUTE"]
    wheel:
      left: ["KEY_UP"]
      right: ["KEY_DOWN"]

  - name: "DaVinci"
    color: { r: 255, g: 0, b: 0 }
    wheel_speed: fast
    buttons:
      0:
        label: "Split"
        keys: ["KEY_LEFTCTRL", "KEY_BACKSLASH"]
      1:
        label: "Join"
        keys: ["KEY_LEFTALT", "KEY_BACKSLASH"]
      2:
        label: "Ripple Del"
        keys: ["KEY_LEFTSHIFT", "KEY_BACKSPACE"]
      3:
        label: "Undo"
        keys: ["KEY_LEFTCTRL", "KEY_Z"]
      4:
        label: "Blade"
        keys: ["KEY_B"]
      5:
        label: "Select"
        keys: ["KEY_A"]
      6:
        label: "Zoom -"
        keys: ["KEY_LEFTCTRL", "KEY_MINUS"]
      7:
        label: "Zoom +"
        keys: ["KEY_LEFTCTRL", "KEY_EQUAL"]
      8:
        label: "Layer"
        keys: ["INTERNAL_LAYER_CYCLE"]
      9:
        label: "Play"
        keys: ["KEY_SPACE"]
    wheel:
      left: ["KEY_LEFT"]
      right: ["KEY_RIGHT"]
